.year-btn:hover{background:rgba(255,176,32,.18);color:#E0E0E0}

.yb-bar-segment{height:100%;transition:width .4s ease}
.yb-cats{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.yb-cat{display:flex;align-items:center;gap:5px;font-size:11px}
.yb-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.yb-cat-name{color:#999;font-size:10px;min-width:32px}
.yb-cat-val{font-family:'IBM Plex Mono',monospace;color:#CCC;font-size:10px;font-weight:500}

#stats{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:24px;

/* ═══════════════════════════════════
   BUBBLE CHART (canvas)

let currentYear = 2022;
let bubbles = [];
let hoveredBubble = null;
let tooltipLocked = false;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const section = document.getElementById('bubble-section');
  W = canvas.width = section.clientWidth;
  H = canvas.height = section.clientHeight;
}
window.addEventListener('resize', () => { resize(); bubbles = makeBubbles(currentYear); });
resize();

function formatVal(v) {
  if (v >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(0)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v;
}

function makeBubbles(year) {
  const incs = INCIDENTS[year] || [];
  const total = incs.reduce((s,i) => s + i.amount, 0);
  const cx = W * 0.57, cy = H * 0.50;
  const catGroups = {};
  CATEGORIES.forEach(c => catGroups[c] = []);
  incs.forEach(inc => catGroups[inc.cat].push(inc));
  const maxR = 50, minR = 6;
  const scale = Math.min(W, H);
  let result = [];
  CATEGORIES.forEach(cat => {
    const group = catGroups[cat];
    if (!group.length) return;
    const baseAngle = CAT_BASE_ANGLE[cat];
    const orbitR = scale * CAT_ORBIT_R[cat];
    group.forEach((inc, idx) => {
      const areaFrac = inc.amount / total;
      const r = Math.max(minR, Math.min(maxR, Math.sqrt(areaFrac) * 60));
      const angleSpread = Math.PI * 1.6;
      const startAngle = baseAngle - angleSpread / 2;
      const angle = group.length > 1 ? startAngle + (idx / (group.length - 1)) * angleSpread : baseAngle;
      const jitter = (Math.random() - 0.5) * 18;
      const tx = cx + Math.cos(angle) * (orbitR + jitter);
      const ty = cy + Math.sin(angle) * (orbitR + jitter);
      result.push({ x:tx,y:ty,targetX:tx,targetY:ty,r,angle,orbitR:orbitR+jitter,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.003+Math.random()*0.006,wobbleR:2+Math.random()*5,inc,color:COLORS[inc.cat],cat });
    });
  });
  for (let iter = 0; iter < 30; iter++) {
    for (let i = 0; i < result.length; i++) {
      for (let j = i+1; j < result.length; j++) {
        const dx = result[j].targetX - result[i].targetX;
        const dy = result[j].targetY - result[i].targetY;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const minDist = result[i].r + result[j].r + 4;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.5;
          const nx = dx/dist, ny = dy/dist;
          result[i].targetX -= nx*push; result[i].targetY -= ny*push;
          result[j].targetX += nx*push; result[j].targetY += ny*push;
        }
      }
    }
  }
  const minX = 340, maxX = W-30, minY = 120, maxY = H-90;
  result.forEach(b => {
    b.targetX = Math.max(minX+b.r, Math.min(maxX-b.r, b.targetX));
    b.targetY = Math.max(minY+b.r, Math.min(maxY-b.r, b.targetY));
    b.x = b.targetX; b.y = b.targetY;
  });
  return result;
}

/* ── Breakdown Panel ── */
function buildBreakdown() {
  const el = document.getElementById('breakdown');
  const maxVal = Math.max(...YEARS.map(y => (INCIDENTS[y]||[]).reduce((s,i)=>s+i.amount,0)));
  let html = '<div class="breakdown-title">Losses by Year</div>';
  YEARS.forEach(y => {
    const incs = INCIDENTS[y] || [];
    const totals = {}; CATEGORIES.forEach(c => totals[c] = 0);
    incs.forEach(i => totals[i.cat] = (totals[i.cat]||0) + i.amount);
    const yearTotal = Object.values(totals).reduce((a,b)=>a+b,0);
    const isActive = y === currentYear;
    html += `<div class="year-block ${isActive?'active':'dimmed'}" data-year="${y}" onclick="setYear(${y})">`;
    html += `<div class="yb-header"><span class="yb-year">${y}</span><span class="yb-total">$${formatVal(yearTotal)}</span></div>`;
    html += `<div class="yb-bar-track">`;
    CATEGORIES.forEach(c => {
      const pct = maxVal > 0 ? (totals[c]/maxVal)*100 : 0;
      if (pct > 0) html += `<div class="yb-bar-segment" style="width:${pct}%;background:${COLORS[c]}"></div>`;
    });
    html += `</div><div class="yb-cats">`;
    CATEGORIES.forEach(c => {
      const cnt = incs.filter(i=>i.cat===c).length;
      if (totals[c] > 0) {
        html += `<div class="yb-cat"><div class="yb-cat-dot" style="background:${COLORS[c]}"></div><span class="yb-cat-name">${CAT_LABELS[c].split('/')[0].split(' ')[0]}</span><span class="yb-cat-val">$${formatVal(totals[c])}</span><span class="yb-cat-count">(${cnt})</span></div>`;
      }
    });
    html += `</div></div>`;
  });
  el.innerHTML = html;
}

function updateStats() {
  const incs = INCIDENTS[currentYear] || [];
  const total = incs.reduce((s,i)=>s+i.amount,0);
  const catCounts = {}; CATEGORIES.forEach(c => catCounts[c] = 0);
  incs.forEach(i => catCounts[i.cat]++);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${incs.length}</div><div class="stat-label">Incidents</div></div>
    <div class="stat"><div class="stat-value">$${formatVal(total)}</div><div class="stat-label">Total Lost</div></div>
    <div class="stat"><div class="stat-value" style="color:${COLORS.code}">${catCounts.code}</div><div class="stat-label">Code</div></div>
    <div class="stat"><div class="stat-value" style="color:${COLORS.social}">${catCounts.social}</div><div class="stat-label">Social</div></div>
    <div class="stat"><div class="stat-value" style="color:${COLORS.bridge}">${catCounts.bridge}</div><div class="stat-label">Bridge</div></div>
    <div class="stat"><div class="stat-value" style="color:${COLORS.key}">${catCounts.key}</div><div class="stat-label">Key</div></div>`;
}

function setYear(year) {
  currentYear = year;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.toggle('active', +b.dataset.year===year));
  document.querySelectorAll('.year-block').forEach(r => {
    r.classList.toggle('active', +r.dataset.year===year);
    r.classList.toggle('dimmed', +r.dataset.year!==year);
  });
  bubbles = makeBubbles(year);
  updateStats();
  hideTooltip();
}

/* ── Year nav ── */
const nav = document.getElementById('year-nav');
YEARS.forEach(y => {
  const btn = document.createElement('button');
  btn.className = 'year-btn' + (y===currentYear?' active':'');
  btn.textContent = y; btn.dataset.year = y;

});

/* ── Tooltip ── */
const tt = document.getElementById('tooltip');
function showTooltip(b, mx, my) {
  const inc = b.inc;
  tt.innerHTML = `<div class="tt-name">${inc.name}</div>
    <div class="tt-amount">$${formatVal(inc.amount)}</div>
    <div class="tt-cat" style="background:${COLORS[inc.cat]}33;color:${COLORS[inc.cat]}">${CAT_LABELS[inc.cat]}</div>
    <div class="tt-desc">${inc.desc}</div>
    <div class="tt-links"><a href="https://etherscan.io/tx/${inc.tx}" target="_blank">TX ↗</a><a href="${inc.news}" target="_blank">Article ↗</a></div>`;
  let tx = mx + 16, ty = my - 10;
  if (tx + 380 > W) tx = mx - 395;
  if (ty + 220 > H) ty = my - 220;
  if (ty < 10) ty = 10;
  tt.style.left = tx+'px'; tt.style.top = ty+'px'; tt.style.display = 'block';
  tooltipLocked = true;
}
function hideTooltip() { tt.style.display='none'; tooltipLocked=false; hoveredBubble=null; }

canvas.addEventListener('mousemove', e => {
  if (tooltipLocked) return;
  const mx=e.clientX, my=e.clientY;
  hoveredBubble = null;
  for (let i=bubbles.length-1;i>=0;i--) {
    const b=bubbles[i], dx=mx-b.x, dy=my-b.y;
    if (dx*dx+dy*dy < b.r*b.r) { hoveredBubble=b; break; }
  }
  if (hoveredBubble) { showTooltip(hoveredBubble,mx,my); canvas.style.cursor='pointer'; }
  else { hideTooltip(); canvas.style.cursor='default'; }
});
tt.addEventListener('mouseleave', () => hideTooltip());
canvas.addEventListener('click', () => { if (hoveredBubble) tooltipLocked=true; });
document.addEventListener('click', e => { if (!e.target.closest('#tooltip') && !e.target.closest('canvas')) hideTooltip(); });

/* ── Drawing helpers ── */
function drawOrbitRings() {
  const cx=W*0.57, cy=H*0.50, scale=Math.min(W,H);
  CATEGORIES.forEach(cat => {
    const incs = (INCIDENTS[currentYear]||[]).filter(i=>i.cat===cat);
    if (!incs.length) return;
    ctx.beginPath(); ctx.arc(cx,cy,scale*CAT_ORBIT_R[cat],0,Math.PI*2);
    ctx.strokeStyle = COLORS[cat]+'15'; ctx.lineWidth=1; ctx.setLineDash([4,8]); ctx.stroke(); ctx.setLineDash([]);
  });
}
function drawGrid() {
  ctx.fillStyle = 'rgba(255,176,32,0.025)';
  for (let x=0;x<W;x+=40) for (let y=0;y<H;y+=40) ctx.fillRect(x,y,1,1);
}
function drawCatLabels() {
  const cx=W*0.57, cy=H*0.50, scale=Math.min(W,H);
  CATEGORIES.forEach(cat => {
    const incs = (INCIDENTS[currentYear]||[]).filter(i=>i.cat===cat);
    if (!incs.length) return;
    const orbitR = scale*CAT_ORBIT_R[cat], angle=CAT_BASE_ANGLE[cat];
    ctx.fillStyle = COLORS[cat]+'AA';
    ctx.font = '12px "IBM Plex Mono", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(CAT_LABELS[cat], cx+Math.cos(angle)*(orbitR+26), cy+Math.sin(angle)*(orbitR+26));
  });
}

let frame = 0;
function animate() {
  ctx.clearRect(0,0,W,H);
  drawGrid(); drawOrbitRings(); drawCatLabels();
  frame++;
  const cx=W*0.57, cy=H*0.50;
  ctx.lineWidth=0.3;
  CATEGORIES.forEach(cat => {
    const cb = bubbles.filter(b=>b.cat===cat);
    ctx.strokeStyle = COLORS[cat]+'15';
    cb.forEach((b,i) => { if(i>0){const p=cb[i-1];ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(b.x,b.y);ctx.stroke();} });
  });
  bubbles.forEach(b => {
    b.wobble += b.wobbleSpeed;
    b.x = b.targetX + Math.cos(b.wobble)*b.wobbleR;
    b.y = b.targetY + Math.sin(b.wobble)*b.wobbleR;
    const isH = b===hoveredBubble;
    const grad = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*(isH?2:1.4));
    grad.addColorStop(0,b.color+(isH?'55':'15'));
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*(isH?2:1.4),0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.color+(isH?'55':'28'); ctx.fill();
    ctx.strokeStyle=b.color+(isH?'dd':'55'); ctx.lineWidth=isH?2:1; ctx.stroke();
    if (b.r>22||isH) {
      ctx.fillStyle=isH?'#FFF':'#AAA';
      ctx.font=`${isH?12:10}px "IBM Plex Mono", monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const name = b.inc.name.length>18&&!isH ? b.inc.name.slice(0,16)+'…' : b.inc.name;
      ctx.fillText(name,b.x,b.y-5);
      ctx.fillStyle=b.color+(isH?'FF':'AA');
      ctx.font=`${isH?11:9}px "IBM Plex Mono", monospace`;
      ctx.fillText('$'+formatVal(b.inc.amount),b.x,b.y+7);
    }
  });
  requestAnimationFrame(animate);
}

/* ═══════════════════════════════════
   LINE CHART (SVG)
   ═══════════════════════════════════ */

function buildLineChart() {
  const container = document.getElementById('line-chart-container');
  const svg = document.getElementById('line-chart');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  svg.setAttribute('viewBox', `0 0 ${cw} ${ch}`);

  // Compute data
  const data = {};
  YEARS.forEach(y => {
    const incs = INCIDENTS[y]||[];
    const byCat = {}; CATEGORIES.forEach(c => byCat[c]=0);
    incs.forEach(i => byCat[i.cat]=(byCat[i.cat]||0)+i.amount);
    const total = incs.reduce((s,i)=>s+i.amount,0);
    data[y] = {total, ...byCat};
  });

  const allTotals = YEARS.map(y => data[y].total);
  const maxVal = Math.max(...allTotals);

  // Chart area (with margins)
  const ml=80, mr=30, mt=20, mb=50;
  const plotW = cw - ml - mr;
  const plotH = ch - mt - mb;

  // Nice Y scale
  function niceMax(v) {
    if (v >= 2e9) return 2.5e9;
    if (v >= 1.5e9) return 2e9;
    if (v >= 1e9) return 1.5e9;
    if (v >= 5e8) return 1e9;
    if (v >= 2e8) return 5e8;
    return Math.ceil(v/5e7)*5e7;
  }
  const yMax = niceMax(maxVal);
  const yTicks = 5;

  function xPos(i) { return ml + (i / (YEARS.length-1)) * plotW; }
  function yPos(v) { return mt + plotH - (v / yMax) * plotH; }
  function fmtAxis(v) {
    if (v >= 1e9) return '$'+(v/1e9).toFixed(1)+'B';
    if (v >= 1e6) return '$'+(v/1e6).toFixed(0)+'M';
    return '$'+v;
  }

  let svgContent = '';

  // Grid lines
  for (let i=0; i<=yTicks; i++) {
    const v = (yMax/yTicks)*i;
    const y = yPos(v);
    svgContent += `<line x1="${ml}" y1="${y}" x2="${ml+plotW}" y2="${y}" stroke="#2A2A2A" stroke-width="1"/>`;
    svgContent += `<text x="${ml-10}" y="${y+4}" text-anchor="end" fill="#888" font-family="'IBM Plex Mono',monospace" font-size="12">${fmtAxis(v)}</text>`;
  }

  // X axis labels
  YEARS.forEach((y,i) => {
    svgContent += `<text x="${xPos(i)}" y="${mt+plotH+28}" text-anchor="middle" fill="#AAA" font-family="'IBM Plex Mono',monospace" font-size="14" font-weight="600">${y}</text>`;
  });

  // Area fills (subtle) for total
  let areaPath = `M${xPos(0)},${yPos(0)}`;
  YEARS.forEach((y,i) => areaPath += ` L${xPos(i)},${yPos(data[y].total)}`);
  areaPath += ` L${xPos(YEARS.length-1)},${yPos(0)} Z`;
  svgContent += `<path d="${areaPath}" fill="rgba(255,176,32,0.06)"/>`;

  // Lines: categories first (behind total)
  const lines = [
    {key:'code',color:COLORS.code,w:2},
    {key:'social',color:COLORS.social,w:2},
    {key:'bridge',color:COLORS.bridge,w:2},
    {key:'key',color:COLORS.key,w:2},
  ];
  lines.forEach(l => {
    let pts = YEARS.map((y,i) => `${xPos(i)},${yPos(data[y][l.key])}`).join(' ');
    svgContent += `<polyline points="${pts}" fill="none" stroke="${l.color}" stroke-width="${l.w}" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>`;
  });

  // Total line (thick, prominent)
  let totalPts = YEARS.map((y,i) => `${xPos(i)},${yPos(data[y].total)}`).join(' ');
  svgContent += `<polyline points="${totalPts}" fill="none" stroke="#FFB020" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Data points + hover targets
  YEARS.forEach((y,i) => {
    const total = data[y].total;
    // Total dot
    svgContent += `<circle cx="${xPos(i)}" cy="${yPos(total)}" r="5" fill="#FFB020" stroke="#0D0D0D" stroke-width="2"/>`;
    // Cat dots
    CATEGORIES.forEach(c => {
      if (data[y][c] > 0) {
        svgContent += `<circle cx="${xPos(i)}" cy="${yPos(data[y][c])}" r="3.5" fill="${COLORS[c]}" stroke="#0D0D0D" stroke-width="1.5"/>`;
      }
    });
    // Invisible hover target
    svgContent += `<circle cx="${xPos(i)}" cy="${mt+plotH/2}" r="${plotW/YEARS.length/2}" fill="transparent" class="hover-target" data-year="${y}" data-idx="${i}"/>`;
  });

  svg.innerHTML = svgContent;

  // Hover interaction
  const ctt = document.getElementById('chart-tooltip');
  svg.querySelectorAll('.hover-target').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const y = +el.dataset.year;
      const i = +el.dataset.idx;
      const d = data[y];
      document.getElementById('ct-year').textContent = y;
      document.getElementById('ct-total').textContent = 'Total: $'+formatVal(d.total);
      let rows = '';
      CATEGORIES.forEach(c => {
        if (d[c] > 0) {
          rows += `<div class="ct-row"><div class="ct-dot" style="background:${COLORS[c]}"></div><span style="color:${COLORS[c]}">${CAT_LABELS[c]}:</span><span class="ct-val">$${formatVal(d[c])}</span></div>`;
        }
      });
      document.getElementById('ct-rows').innerHTML = rows;
      const rect = container.getBoundingClientRect();
      const px = xPos(i);
      let left = px + 15;
      if (left + 200 > cw) left = px - 210;
      let top = yPos(d.total) - 30;
      if (top < 0) top = 10;
      ctt.style.left = left+'px';
      ctt.style.top = top+'px';
      ctt.style.display = 'block';
    });
    el.addEventListener('mouseleave', () => { ctt.style.display='none'; });
  });
}

/* ═══════════════════════════════════
   INIT
   ═══════════════════════════════════ */
bubbles = makeBubbles(currentYear);
buildBreakdown();
updateStats();
animate();
buildLineChart();
window.addEventListener('resize', () => { setTimeout(buildLineChart, 100); });
</script>
